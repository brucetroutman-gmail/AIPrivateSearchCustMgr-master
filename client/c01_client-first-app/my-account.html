<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - AI Private Search</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>
    <div class="header">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; color: var(--accent-color);">AI Private Search</h1>
            <div>
                <span id="userEmail" style="margin-right: 1rem;"></span>
                <a href="#" id="logoutLink" style="color: var(--accent-color);">Logout</a>
            </div>
        </div>
    </div>
    
    <main class="container" style="max-width: 800px; margin: 2rem auto; padding: 2rem;">
        <h1>My Account</h1>
        
        <div class="card" style="margin-bottom: 2rem; border-color: var(--border-color); background: var(--card-bg);">
            <h2>License Information</h2>
            <div id="licenseInfo">
                <p>Loading license information...</p>
            </div>
            <div id="refundPreviewBox" class="refund-preview-box">
                <div class="refund-preview-title">❌ Cancel &amp; Refund Summary</div>
                <div id="refundPreviewDetail" class="refund-preview-detail"></div>
                <div class="refund-preview-actions">
                    <button id="refundConfirmBtn" class="btn-confirm-refund">Confirm Cancellation</button>
                    <button id="refundCancelBtn" class="btn-keep-subscription">Keep Subscription</button>
                </div>
            </div>
        </div>
        
        <div id="paymentHistorySection" style="display:none;"></div>

        <div class="card" style="margin-bottom: 2rem; border-color: var(--border-color); background: var(--card-bg);">
            <h2>Manage Devices</h2>
            <div id="devicesInfo">
                <p>Loading devices...</p>
            </div>
        </div>
        
        <div class="card" style="margin-bottom: 2rem; border-color: var(--border-color); background: var(--card-bg);">
            <h2>Account Information</h2>
            <form id="profileForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" readonly style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                </div>
                <div class="form-group">
                    <label for="postalCode">Postal Code</label>
                    <input type="text" id="postalCode" style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                </div>
                <button type="submit">Update Profile</button>
            </form>
        </div>
        
        <div class="card" style="border-color: var(--border-color); background: var(--card-bg);">
            <h2>Change Password</h2>
            <form id="passwordForm" class="auth-form">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" minlength="8" style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                    <small>Minimum 8 characters, include uppercase, lowercase, and number</small>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" style="background: var(--input-bg); color: var(--text-color); border-color: var(--border-color);">
                </div>
                <button type="submit">Change Password</button>
            </form>
        </div>
    </main>
    
    <script>
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:56304' : '';
        
        function showMessage(message, type = 'error') {
            const messageEl = document.createElement('div');
            messageEl.className = 'toast-message toast-' + type;
            messageEl.textContent = message;
            document.body.appendChild(messageEl);
            setTimeout(() => {
                if (messageEl.parentNode) {
                    messageEl.parentNode.removeChild(messageEl);
                }
            }, 3000);
        }
        
        function validatePassword(password) {
            const minLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /\d/.test(password);
            return minLength && hasUpper && hasLower && hasNumber;
        }
        
        function el(tag, styles, text) {
            const e = document.createElement(tag);
            if (styles) Object.assign(e.style, styles);
            if (text) e.textContent = text;
            return e;
        }

        function displayLicenseInfo(license) {
            const statusColor = license.status === 'trial' ? '#ffd700' :
                               license.status === 'active' ? '#28a745' : '#dc3545';
            const statusText = license.status === 'trial' ? 'Trial' :
                              license.status === 'active' ? 'Active' : 'Expired';

            const container = document.getElementById('licenseInfo');
            container.textContent = '';

            // Grid of license fields
            const grid = el('div', { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1rem' });
            const fields = [
                ['License Key', license.customer_code, true],
                ['Tier', license.tier_name],
                ['Status', statusText, false, statusColor],
                ['Expires', new Date(license.expires_at).toLocaleDateString()],
                ['Devices', `${license.device_count} / ${license.max_devices} used`],
                ['Available Slots', `${license.available_devices} remaining`]
            ];
            fields.forEach(([label, value, isCode, color]) => {
                const cell = el('div');
                const strong = el('strong', null, label + ':');
                const br = document.createElement('br');
                cell.appendChild(strong);
                cell.appendChild(br);
                if (isCode) {
                    const code = el('code', { background: 'rgba(255,255,255,0.1)', padding: '2px 4px', borderRadius: '2px' }, value);
                    cell.appendChild(code);
                } else if (color) {
                    const span = el('span', { color, fontWeight: 'bold' }, value);
                    cell.appendChild(span);
                } else {
                    cell.appendChild(document.createTextNode(value));
                }
                grid.appendChild(cell);
            });
            container.appendChild(grid);

            // Expiry warning
            if (license.days_remaining <= 7 && license.days_remaining > 0) {
                const warn = el('div', { background: 'rgba(255,193,7,0.1)', border: '1px solid #ffc107', padding: '10px', borderRadius: '4px', marginTop: '10px' });
                warn.textContent = `⚠️ Expiring Soon: Your license expires in ${license.days_remaining} day(s)`;
                container.appendChild(warn);
            }
            if (license.is_expired) {
                const exp = el('div', { background: 'rgba(220,53,69,0.1)', border: '1px solid #dc3545', padding: '10px', borderRadius: '4px', marginTop: '10px' });
                exp.textContent = '❌ License Expired: Please renew your subscription';
                container.appendChild(exp);
            }

            // Buttons
            const btnRow = el('div', { marginTop: '15px', display: 'flex', gap: '10px', flexWrap: 'wrap' });
            const changeTierBtn = el('button', { flex: '1', padding: '10px', background: 'var(--accent-color)', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }, '🔄 Change Tier');
            const payHistBtn = el('button', { flex: '1', padding: '10px', background: 'var(--accent-color)', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }, '💳 Payment History');
            changeTierBtn.addEventListener('click', showChangeTier);
            payHistBtn.addEventListener('click', showPaymentHistory);
            btnRow.appendChild(changeTierBtn);
            btnRow.appendChild(payHistBtn);
            if (license.status === 'active') {
                const cancelBtn = el('button', { flex: '1', padding: '10px', background: '#dc3545', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }, '❌ Cancel & Refund');
                cancelBtn.addEventListener('click', confirmCancelAndRefund);
                btnRow.appendChild(cancelBtn);
            }
            container.appendChild(btnRow);

            // Download link
            const dlBox = el('div', { marginTop: '15px', padding: '10px', background: 'rgba(135,206,235,0.1)', border: '1px solid var(--accent-color)', borderRadius: '4px' });
            const dlLabel = el('strong', null, 'Download AI Private Search:');
            const dlBr = document.createElement('br');
            const dlLink = el('a', { color: 'var(--accent-color)', textDecoration: 'none' }, '📥 Download Installer');
            dlLink.href = 'https://aiprivatesearch.com/downloads/AIPrivateSearch.dmg';
            dlLink.target = '_blank';
            dlBox.appendChild(dlLabel);
            dlBox.appendChild(dlBr);
            dlBox.appendChild(dlLink);
            container.appendChild(dlBox);
        }
        
        async function confirmCancelAndRefund() {
            const sessionId = localStorage.getItem('sessionId');
            const previewBox = document.getElementById('refundPreviewBox');
            const detail = document.getElementById('refundPreviewDetail');

            // Toggle off if already showing
            if (previewBox.style.display !== 'none') {
                previewBox.style.display = 'none';
                return;
            }

            detail.textContent = 'Calculating refund...';
            previewBox.style.display = 'block';
            previewBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            try {
                const res = await fetch(`${API_BASE}/api/payments/preview-refund`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    detail.textContent = '';
                    const table = document.createElement('table');
                    table.className = 'refund-preview-table';
                    [
                        [`${data.tierName} annual price`, data.annualPriceDisplay, ''],
                        ['Days used', `${data.usedDays} of ${data.totalDays}`, 'text-danger'],
                        ['Days remaining', String(data.unusedDays), 'text-success'],
                        ['Refund amount', data.refundDisplay, 'text-success']
                    ].forEach(([label, value, cls], i) => {
                        const tr = document.createElement('tr');
                        if (i === 3) tr.className = 'row-total';
                        const td1 = document.createElement('td');
                        td1.textContent = label;
                        const td2 = document.createElement('td');
                        td2.textContent = value;
                        if (cls) td2.className = cls;
                        tr.appendChild(td1);
                        tr.appendChild(td2);
                        table.appendChild(tr);
                    });
                    detail.appendChild(table);
                    const note = document.createElement('p');
                    note.className = 'refund-preview-note';
                    note.textContent = 'Refund will be processed to your original payment method within 5–10 business days. Your account reverts to a 60-day trial.';
                    detail.appendChild(note);
                } else {
                    detail.textContent = data.error || 'Unable to calculate refund. Please contact support.';
                }
            } catch (_e) {
                detail.textContent = 'Network error. Please try again.';
            }

            document.getElementById('refundCancelBtn').onclick = () => {
                previewBox.style.display = 'none';
            };

            document.getElementById('refundConfirmBtn').onclick = async () => {
                document.getElementById('refundConfirmBtn').disabled = true;
                document.getElementById('refundConfirmBtn').textContent = 'Processing...';
                try {
                    const response = await fetch(`${API_BASE}/api/payments/cancel-and-refund`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${sessionId}` }
                    });
                    const result = await response.json();
                    previewBox.style.display = 'none';
                    if (response.ok && result.success) {
                        showMessage(`Refund of ${result.amountDisplay} is being processed to your credit card.`, 'success');
                        await loadProfile();
                    } else {
                        showMessage(result.error || 'Cancellation failed. Please contact support.');
                    }
                } catch (_e) {
                    showMessage('Network error. Please try again.');
                    document.getElementById('refundConfirmBtn').disabled = false;
                    document.getElementById('refundConfirmBtn').textContent = 'Confirm Cancellation';
                }
            };
        }

        async function loadProfile() {
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) {
                window.location.href = '/user-management.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                
                if (!response.ok) {
                    throw new Error('Session expired');
                }
                
                const data = await response.json();
                const user = data.user;
                
                document.getElementById('userEmail').textContent = user.email;
                currentCustomerId = user.id;
                
                // Load customer profile
                const profileResponse = await fetch(`${API_BASE}/api/customers/${user.id}`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                
                if (profileResponse.ok) {
                    const profileData = await profileResponse.json();
                    const customer = profileData.customer;
                    
                    document.getElementById('email').value = customer.email;
                    document.getElementById('phone').value = customer.phone || '';
                    document.getElementById('city').value = customer.city || '';
                    document.getElementById('state').value = customer.state || '';
                    document.getElementById('postalCode').value = customer.postal_code || '';
                }
                
                // Load license information
                const licenseResponse = await fetch(`${API_BASE}/api/customers/${user.id}/license`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                
                if (licenseResponse.ok) {
                    const licenseData = await licenseResponse.json();
                    displayLicenseInfo(licenseData.license);
                } else {
                    document.getElementById('licenseInfo').innerHTML = '<p>No license information available</p>';
                }
                
                // Load devices
                await loadDevices(user.id, sessionId);
            } catch (error) {
                console.error('Error loading profile:', error);
                localStorage.removeItem('sessionId');
                window.location.href = '/user-management.html';
            }
        }
        
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const sessionId = localStorage.getItem('sessionId');
            const response = await fetch(`${API_BASE}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${sessionId}` }
            });
            const data = await response.json();
            const userId = data.user.id;
            
            const formData = {
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                postal_code: document.getElementById('postalCode').value
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/customers/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionId}`
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    showMessage('Profile updated successfully', 'success');
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Update failed');
                }
            } catch (error) {
                showMessage('Update failed: ' + error.message);
            }
        });
        
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (!validatePassword(newPassword)) {
                showMessage('Password must be at least 8 characters with uppercase, lowercase, and number');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match');
                return;
            }
            
            const sessionId = localStorage.getItem('sessionId');
            const response = await fetch(`${API_BASE}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${sessionId}` }
            });
            const data = await response.json();
            const userId = data.user.id;
            
            try {
                const response = await fetch(`${API_BASE}/api/customers/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionId}`
                    },
                    body: JSON.stringify({ password: newPassword })
                });
                
                if (response.ok) {
                    showMessage('Password changed successfully', 'success');
                    document.getElementById('passwordForm').reset();
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Password change failed');
                }
            } catch (error) {
                showMessage('Password change failed: ' + error.message);
            }
        });
        
        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                try {
                    await fetch(`${API_BASE}/api/auth/logout`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${sessionId}` }
                    });
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }
            
            localStorage.removeItem('sessionId');
            window.location.href = '/user-management.html';
        });
        

        async function loadDevices(customerId, sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/customers/${customerId}/devices`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayDevices(data.devices, customerId, sessionId);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('Failed to load devices:', response.status, errorData);
                    document.getElementById('devicesInfo').innerHTML = '<p>Unable to load devices</p>';
                }
            } catch (error) {
                console.error('Error loading devices:', error);
                document.getElementById('devicesInfo').innerHTML = '<p>Error loading devices</p>';
            }
        }
        
        function displayDevices(devices, customerId, sessionId) {
            if (devices.length === 0) {
                document.getElementById('devicesInfo').innerHTML = '<p>No devices registered yet</p>';
                return;
            }
            
            const devicesHtml = devices.map(device => {
                const lastSeen = device.last_activity ? new Date(device.last_activity).toLocaleString() : 'Never';
                const registered = new Date(device.created_at).toLocaleString();
                const statusColor = device.status === 'active' ? '#28a745' : '#6c757d';
                
                return `
                    <div style="padding: 1rem; border: 1px solid var(--border-color); border-radius: 4px; margin-bottom: 1rem;">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <div style="font-weight: bold; margin-bottom: 0.5rem;">
                                    <span style="color: ${statusColor};">●</span> ${device.device_name || device.pc_code || 'Unknown Device'}
                                </div>
                                <div style="font-size: 0.9em; color: #999;">
                                    <div>Registered: ${registered}</div>
                                    <div>Last Seen: ${lastSeen}</div>
                                    <div>Status: ${device.status}</div>
                                </div>
                            </div>
                            <button onclick="deleteDevice(${device.id}, '${customerId}', '${sessionId}')" 
                                    style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">
                                🗑️ Remove
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('devicesInfo').innerHTML = `
                <div style="margin-bottom: 1rem; padding: 10px; background: rgba(135, 206, 235, 0.1); border: 1px solid var(--accent-color); border-radius: 4px;">
                    <strong>ℹ️ Note:</strong> Removing a device will require re-activation with your license key.
                </div>
                ${devicesHtml}
            `;
        }
        
        let currentCustomerId = null;

        function showChangeTier() {
            window.location.href = 'change-tier.html';
        }

        async function showPaymentHistory() {
            const sessionId = localStorage.getItem('sessionId');
            if (!currentCustomerId) { showMessage('Session error. Please reload the page.'); return; }

            // Toggle
            const existing = document.getElementById('paymentHistorySection');
            if (existing.style.display !== 'none' && existing.children.length > 0) {
                existing.style.display = 'none';
                existing.textContent = '';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/payments/history/${currentCustomerId}`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                const data = await response.json();
                const payments = data.payments || [];

                const TIER_NAMES = { 1: 'Standard', 2: 'Premium', 3: 'Professional' };
                const STATUS_COLORS = { completed: '#28a745', pending: '#ffc107', failed: '#dc3545', refunded: '#6c757d' };

                const section = document.getElementById('paymentHistorySection');
                section.textContent = '';
                Object.assign(section.style, { display: 'block', marginBottom: '2rem', borderColor: 'var(--border-color)', background: 'var(--card-bg)' });
                section.className = 'card';

                // Header row with close button
                const titleRow = el('div', { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' });
                titleRow.appendChild(el('h2', null, 'Payment History'));
                const closeBtn = el('button', { background: 'transparent', border: 'none', color: 'var(--accent-color)', cursor: 'pointer', fontSize: '1.2rem' }, '✕ Close');
                closeBtn.addEventListener('click', () => { section.style.display = 'none'; section.textContent = ''; });
                titleRow.appendChild(closeBtn);
                section.appendChild(titleRow);

                // Header row
                const headerRow = el('div', { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '0.5rem', paddingBottom: '0.5rem', borderBottom: '2px solid var(--border-color)', fontWeight: 'bold', fontSize: '0.9em' });
                ['Date', 'Tier', 'Amount', 'Status'].forEach(h => headerRow.appendChild(el('div', null, h)));
                section.appendChild(headerRow);

                if (payments.length === 0) {
                    section.appendChild(el('p', { color: '#999', marginTop: '1rem' }, 'No payment history found.'));
                } else {
                    payments.forEach(p => {
                        const row = el('div', { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '0.5rem', padding: '0.75rem 0', borderBottom: '1px solid var(--border-color)', fontSize: '0.9em' });
                        row.appendChild(el('div', null, new Date(p.created_at).toLocaleDateString()));
                        row.appendChild(el('div', null, TIER_NAMES[p.tier_purchased] || 'Unknown'));
                        row.appendChild(el('div', null, p.amount_display));
                        const statusEl = el('div', { color: STATUS_COLORS[p.status] || '#999', fontWeight: 'bold', textTransform: 'capitalize' }, p.status);
                        row.appendChild(statusEl);
                        section.appendChild(row);
                    });
                }

                section.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                showMessage('Failed to load payment history');
            }
        }
        
        async function deleteDevice(deviceId, customerId, sessionId) {
            if (!confirm('Are you sure you want to remove this device? It will need to be re-activated.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/devices/${deviceId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                
                if (response.ok) {
                    showMessage('Device removed successfully', 'success');
                    await loadDevices(customerId, sessionId);
                    loadProfile(); // Reload to update device count
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Failed to remove device');
                }
            } catch (error) {
                showMessage('Failed to remove device: ' + error.message);
            }
        }
        
        // Show tier change message if redirected from change-tier
        const tierChangeMsg = sessionStorage.getItem('tierChangeMsg');
        if (tierChangeMsg) {
            showMessage(tierChangeMsg, 'success');
            sessionStorage.removeItem('tierChangeMsg');
            // Poll until DB reflects the new tier (webhook may be slightly delayed)
            const expectedTier = sessionStorage.getItem('expectedTier');
            sessionStorage.removeItem('expectedTier');
            if (expectedTier) {
                let attempts = 0;
                const sessionId = localStorage.getItem('sessionId');
                const poll = setInterval(async () => {
                    attempts++;
                    if (!currentCustomerId) return;
                    const res = await fetch(`${API_BASE}/api/customers/${currentCustomerId}/license`, {
                        headers: { 'Authorization': `Bearer ${sessionId}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (String(data.license?.tier) === String(expectedTier) || attempts >= 10) {
                            clearInterval(poll);
                            displayLicenseInfo(data.license);
                        }
                    } else {
                        clearInterval(poll);
                    }
                }, 1000);
            }
        }

        loadProfile();
    </script>
</body>
</html>
