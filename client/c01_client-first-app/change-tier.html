<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Tier - AI Private Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; color: var(--accent-color);">AI Private Search</h1>
            <a href="my-account.html" style="color: var(--accent-color);">← Back to My Account</a>
        </div>
    </div>

    <main class="container" style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
        <h1>Change Subscription Tier</h1>
        <p style="color: #999; margin-bottom: 2rem;">All plans billed annually. You will be redirected to Stripe to complete payment.</p>

        <div class="card" style="border-color: var(--border-color); background: var(--card-bg);">
            <form id="tierForm">
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; padding: 1rem; border: 2px solid var(--border-color); border-radius: 4px; margin-bottom: 1rem; cursor: pointer;">
                        <input type="radio" name="tier" value="1" style="margin-right: 10px;">
                        <strong>Standard</strong> — 2 devices, Basic features
                        <div style="margin-left: 24px; color: #999; font-size: 0.9em;">$49.00 / year</div>
                    </label>

                    <label style="display: block; padding: 1rem; border: 2px solid var(--border-color); border-radius: 4px; margin-bottom: 1rem; cursor: pointer;">
                        <input type="radio" name="tier" value="2" style="margin-right: 10px;">
                        <strong>Premium</strong> — 5 devices, Advanced features
                        <div style="margin-left: 24px; color: #999; font-size: 0.9em;">$199.00 / year</div>
                    </label>

                    <label style="display: block; padding: 1rem; border: 2px solid var(--border-color); border-radius: 4px; margin-bottom: 1rem; cursor: pointer;">
                        <input type="radio" name="tier" value="3" style="margin-right: 10px;">
                        <strong>Professional</strong> — 10 devices, All features
                        <div style="margin-left: 24px; color: #999; font-size: 0.9em;">$499.00 / year</div>
                    </label>
                </div>

                <button type="submit" style="width: 100%;">Continue to Payment</button>
                <div id="errorMsg" style="color: #ff6b6b; text-align: center; margin-top: 1rem; display: none;"></div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:56304' : '';

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function loadCurrentTier() {
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) {
                window.location.href = '/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                const data = await response.json();

                const licenseResponse = await fetch(`${API_BASE}/api/customers/${data.user.id}/license`, {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                const licenseData = await licenseResponse.json();

                const currentTier = licenseData.license?.tier;
                if (currentTier) {
                    const radio = document.querySelector(`input[value="${currentTier}"]`);
                    if (radio) radio.checked = true;
                }
            } catch (error) {
                window.location.href = '/login.html';
            }
        }

        document.getElementById('tierForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const selected = document.querySelector('input[name="tier"]:checked');
            if (!selected) {
                showError('Please select a tier.');
                return;
            }

            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) {
                window.location.href = '/login.html';
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Redirecting to payment...';

            try {
                const response = await fetch(`${API_BASE}/api/payments/create-checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionId}`
                    },
                    body: JSON.stringify({ tier: parseInt(selected.value) })
                });

                const data = await response.json();

                if (response.ok && data.url) {
                    window.location.href = data.url;
                } else {
                    showError(data.error || 'Failed to start checkout. Please try again.');
                    btn.disabled = false;
                    btn.textContent = 'Continue to Payment';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Continue to Payment';
            }
        });

        loadCurrentTier();
    </script>
</body>
</html>
